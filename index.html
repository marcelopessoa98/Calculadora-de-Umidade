<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora de Umidade - Areia</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Calculadora de Umidade - CONCREFUJI</h1>
        <p>Controle Tecnológico de Materiais</p>
      </header>

      <div class="calculator-box">
        <div class="input-group">
          <label for="pesoUmido">Peso da Areia Úmida (g)</label>
          <input
            type="number"
            id="pesoUmido"
            placeholder="Ex: 500.00"
            step="0.01"
          />
        </div>

        <div class="input-group">
          <label for="pesoSeco">Peso da Areia Seca (g)</label>
          <input
            type="number"
            id="pesoSeco"
            placeholder="Ex: 480.00"
            step="0.01"
          />
        </div>

        <button onclick="calcularUmidade()" class="btn-calculate">
          Calcular Porcentagem
        </button>

        <div id="resultContainer" class="result-container hidden">
          <span>Teor de Umidade:</span>
          <div id="resultado" class="result-value">0%</div>
        </div>
      </div>

      <footer>
        <p>Data do Ensaio: <span id="currentDate"></span></p>
      </footer>
    </div>
    <script src="script.js"></script>
  </body>
</html>
