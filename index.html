<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>SGI - ConcreFuji</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      /* Toque de App: Remove o scroll horizontal e o highlight de clique no mobile */
      body {
        -webkit-tap-highlight-color: transparent;
      }
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
    </style>
  </head>
  <body class="bg-gray-50 min-h-screen pb-24 font-sans selection:bg-red-100">
    <header
      class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-100"
    >
      <div class="max-w-xl mx-auto px-5 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
          <img src="assets/logoIcone.png" alt="Logo" class="h-9 w-auto" />
          <h1 class="text-lg font-bold text-gray-800 tracking-tight">
            CONCRE <span class="text-red-600">FUJI</span>
          </h1>
        </div>
        <div
          class="flex items-center gap-2 bg-emerald-50 px-3 py-1 rounded-full"
        >
          <span
            class="flex h-2 w-2 rounded-full bg-emerald-500 animate-pulse"
          ></span>
          <span class="text-[10px] font-bold text-emerald-700 uppercase"
            >Online</span
          >
        </div>
      </div>
    </header>

    <section class="max-w-xl mx-auto px-5 pt-8 pb-4">
      <h2 class="text-2xl font-black text-gray-900 tracking-tight">
        Bem-vindo(a)!
      </h2>
      <p class="text-sm text-gray-500 mt-1">O que vamos fazer hoje?</p>
    </section>

    <main class="max-w-xl mx-auto px-5 grid grid-cols-1 gap-4">
      <a
        href="pages/umidade.html"
        class="flex items-center bg-white p-4 rounded-2xl border border-gray-100 shadow-sm active:scale-95 transition-all"
      >
        <div class="bg-red-50 text-red-600 p-4 rounded-2xl mr-4">
          <i class="fa-solid fa-droplet text-xl"></i>
        </div>
        <div class="flex-1">
          <h3 class="font-bold text-gray-800">Umidade de Areia</h3>
          <p class="text-xs text-gray-400">Teor de umidade (g)</p>
        </div>
        <i class="fa-solid fa-chevron-right text-gray-300 text-sm"></i>
      </a>

      <a
        href="pages/conversao.html"
        class="flex items-center bg-white p-4 rounded-2xl border border-gray-100 shadow-sm active:scale-95 transition-all"
      >
        <div class="bg-blue-50 text-blue-600 p-4 rounded-2xl mr-4">
          <i class="fa-solid fa-arrows-rotate text-xl"></i>
        </div>
        <div class="flex-1">
          <h3 class="font-bold text-gray-800">Conversor Técnico</h3>
          <p class="text-xs text-gray-400">Tf, kN e MPa</p>
        </div>
        <i class="fa-solid fa-chevron-right text-gray-300 text-sm"></i>
      </a>

      <a
        href="pages/treinamentos.html"
        class="flex items-center bg-white p-4 rounded-2xl border border-gray-100 shadow-sm active:scale-95 transition-all"
      >
        <div class="bg-emerald-50 text-emerald-600 p-4 rounded-2xl mr-4">
          <i class="fa-solid fa-graduation-cap text-xl"></i>
        </div>
        <div class="flex-1">
          <h3 class="font-bold text-gray-800">Treinamentos</h3>
          <p class="text-xs text-gray-400">Capacitação e POPs</p>
        </div>
        <i class="fa-solid fa-chevron-right text-gray-300 text-sm"></i>
      </a>
    </main>

    <nav
      class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-lg border-t border-gray-100 px-6 py-3 z-50"
    >
      <div
        class="max-w-xl mx-auto flex justify-between items-center text-gray-400"
      >
        <a
          href="index.html"
          class="flex flex-col items-center gap-1 text-red-600"
        >
          <i class="fa-solid fa-house text-lg"></i>
          <span class="text-[10px] font-bold uppercase">Início</span>
        </a>
        <a
          href="pages/conversao.html"
          class="flex flex-col items-center gap-1 hover:text-gray-600 transition-colors"
        >
          <i class="fa-solid fa-calculator text-lg"></i>
          <span class="text-[10px] font-bold uppercase">Cálculos</span>
        </a>
        <a
          href="pages/treinamentos.html"
          class="flex flex-col items-center gap-1 hover:text-gray-600 transition-colors"
        >
          <i class="fa-solid fa-book-open text-lg"></i>
          <span class="text-[10px] font-bold uppercase">Aulas</span>
        </a>
        <button
          class="flex flex-col items-center gap-1 hover:text-gray-600 transition-colors"
        >
          <i class="fa-solid fa-user text-lg"></i>
          <span class="text-[10px] font-bold uppercase">Perfil</span>
        </button>
      </div>
    </nav>

    <footer
      class="hidden sm:block max-w-xl mx-auto px-5 mt-12 pb-8 text-center"
    >
      <img
        src="assets/logo.png"
        alt="ConcreFuji"
        class="h-5 mx-auto grayscale opacity-30 mb-2"
      />
      <p
        class="text-[10px] text-gray-400 font-medium uppercase tracking-widest"
      >
        &copy; 2026 ConcreFuji - CONCRETEC | Desenvolvido por Marcelo Pessoa
      </p>
    </footer>
  </body>
</html>
