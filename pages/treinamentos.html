<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Treinamentos - ConcreFuji</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body class="bg-gray-50 min-h-screen p-4 font-sans text-gray-900">
    <div class="max-w-5xl mx-auto">
      <a
        href="../index.html"
        class="inline-flex items-center mb-6 text-gray-500 hover:text-red-600 transition-colors group"
      >
        <i
          class="fa-solid fa-arrow-left mr-2 transition-transform group-hover:-translate-x-1"
        ></i>
        Voltar ao Menu
      </a>

      <header class="mb-10">
        <h1
          class="text-3xl font-black text-gray-800 uppercase tracking-tighter"
        >
          Portal de <span class="text-red-600">Treinamento</span>
        </h1>
        <p class="text-gray-500">
          Capacitação técnica e normas de segurança ConcreFuji.
        </p>
      </header>

      <div class="flex gap-2 mb-8 overflow-x-auto pb-2">
        <button
          class="bg-red-600 text-white px-4 py-2 rounded-full text-xs font-bold uppercase"
        >
          Todos
        </button>
        <button
          class="bg-white border border-gray-200 text-gray-500 px-4 py-2 rounded-full text-xs font-bold uppercase hover:border-red-600"
        >
          Laboratório
        </button>
        <button
          class="bg-white border border-gray-200 text-gray-500 px-4 py-2 rounded-full text-xs font-bold uppercase hover:border-red-600"
        >
          Segurança
        </button>
      </div>

      <main
        id="gridTreinamentos"
        class="grid grid-cols-1 md:grid-cols-3 gap-6"
      ></main>
    </div>

    <script src="../js/treinamentos.js"></script>
  </body>
</html>
