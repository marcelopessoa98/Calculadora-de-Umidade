<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Treinamentos - ConcreFuji</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body class="bg-[#f8f9fa] min-h-screen pb-20 font-sans">
    <div class="max-w-xl mx-auto px-5">
      <header class="py-8">
        <a
          href="../index.html"
          class="text-gray-400 hover:text-red-600 transition-colors text-sm font-bold uppercase tracking-widest"
        >
          <i class="fa-solid fa-chevron-left mr-1"></i> Voltar
        </a>
        <h1 class="text-3xl font-black text-gray-900 mt-4 uppercase italic">
          Treinamentos
        </h1>
        <p class="text-gray-500 text-sm">Procedimentos Técnicos e Normas</p>
      </header>

      <main class="space-y-4">
        <div class="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm">
          <div class="flex items-center gap-4 mb-3">
            <div class="bg-red-50 text-red-600 p-3 rounded-xl">
              <i class="fa-solid fa-play"></i>
            </div>
            <h3 class="font-bold text-gray-800">Moldagem de Corpos de Prova</h3>
          </div>
          <p class="text-xs text-gray-500 mb-4">
            Instruções baseadas na NBR 5738 para moldagem e cura.
          </p>
          <a
            href=""
            target="_blank"
            class="block w-full text-center bg-gray-900 text-white font-bold py-3 rounded-xl hover:bg-red-600 transition-all uppercase text-xs tracking-widest"
            >Assistir Aula</a
          >
        </div>

        <div class="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm">
          <div class="flex items-center gap-4 mb-3">
            <div class="bg-blue-50 text-blue-600 p-3 rounded-xl">
              <i class="fa-solid fa-vial"></i>
            </div>
            <h3 class="font-bold text-gray-800">Ensaio de Slump Test</h3>
          </div>
          <p class="text-xs text-gray-500 mb-4">
            Determinação da consistência pelo abatimento do tronco de cone.
          </p>
          <a
            href=""
            target="_blank"
            class="block w-full text-center bg-gray-900 text-white font-bold py-3 rounded-xl hover:bg-blue-600 transition-all uppercase text-xs tracking-widest"
            >Assistir Aula</a
          >
        </div>
      </main>
    </div>
  </body>
</html>
