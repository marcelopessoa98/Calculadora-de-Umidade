<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Administrativo - ConcreFuji</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
      body { -webkit-tap-highlight-color: transparent; }
    </style>
  </head>
  <body class="bg-gray-50 min-h-screen p-4 pb-24 font-sans text-gray-900">
    <div class="max-w-2xl mx-auto">
      <div class="flex justify-between items-center mb-6">
        <a href="../index.html" class="text-gray-400 hover:text-red-600 transition-colors">
          <i class="fa-solid fa-arrow-left mr-2"></i> Voltar
        </a>
        <button id="btnLogoutAdmin" class="hidden text-[10px] font-bold text-gray-400 hover:text-red-600 uppercase">Sair</button>
      </div>

      <header class="mb-6 text-center">
        <h1 class="text-2xl font-black text-gray-800 uppercase tracking-tighter">Painel <span class="text-red-600">Administrativo</span></h1>
        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-1 italic">Gestão de obras, ponto e relatórios</p>
      </header>

      <section id="loginCard" class="bg-white p-5 rounded-3xl border border-gray-100 shadow-sm space-y-3">
        <h3 class="text-xs font-black uppercase tracking-widest text-gray-700">Login Admin</h3>
        <input id="adminUsuario" type="text" placeholder="Usuário" class="w-full p-3 rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-red-500 text-sm" />
        <input id="adminSenha" type="password" placeholder="Senha" class="w-full p-3 rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-red-500 text-sm" />
        <button id="btnLoginAdmin" class="w-full bg-red-600 text-white font-bold py-3 rounded-2xl text-xs uppercase tracking-widest">Entrar no Painel</button>
      </section>

      <div id="painelAdmin" class="hidden space-y-5">
        <section class="bg-white p-5 rounded-3xl border border-gray-100 shadow-sm space-y-3">
          <h3 class="text-xs font-black uppercase tracking-widest text-gray-700">Cadastro de Obras</h3>
          <input id="obraId" type="hidden" />
          <input id="obraNome" type="text" placeholder="Nome da obra" class="w-full p-3 rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-red-500 text-sm" />
          <input id="obraCliente" type="text" placeholder="Cliente" class="w-full p-3 rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-red-500 text-sm" />
          <input id="obraEndereco" type="text" placeholder="Endereço" class="w-full p-3 rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-red-500 text-sm" />
          <div class="grid grid-cols-2 gap-2">
            <button id="btnSalvarObra" class="w-full bg-slate-800 text-white font-bold py-3 rounded-2xl text-xs uppercase tracking-widest">Salvar Obra</button>
            <button id="btnCancelarEdicaoObra" class="w-full bg-gray-200 text-gray-700 font-bold py-3 rounded-2xl text-xs uppercase tracking-widest">Cancelar</button>
          </div>
          <ul id="listaObras" class="space-y-2"></ul>
        </section>

        <section class="bg-white p-5 rounded-3xl border border-gray-100 shadow-sm space-y-3">
          <h3 class="text-xs font-black uppercase tracking-widest text-gray-700">Pontos dos Funcionários</h3>
          <div class="grid grid-cols-2 gap-2">
            <input id="filtroPontoFuncionario" type="text" placeholder="Filtrar por funcionário" class="w-full p-3 rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-red-500 text-sm" />
            <input id="filtroPontoData" type="date" class="w-full p-3 rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-red-500 text-sm" />
          </div>
          <ul id="listaPontos" class="space-y-2"></ul>
        </section>

        <section class="bg-white p-5 rounded-3xl border border-gray-100 shadow-sm space-y-3">
          <h3 class="text-xs font-black uppercase tracking-widest text-gray-700">Relatório de Horas Extras</h3>
          <div class="grid grid-cols-2 gap-2">
            <input id="relatorioDataInicio" type="date" class="w-full p-3 rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-red-500 text-sm" />
            <input id="relatorioDataFim" type="date" class="w-full p-3 rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-red-500 text-sm" />
          </div>
          <button id="btnGerarRelatorio" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-2xl text-xs uppercase tracking-widest">Gerar Relatório</button>
          <div id="resultadoRelatorio" class="text-xs text-gray-600 leading-relaxed"></div>
        </section>
      </div>

      <p id="statusAdmin" class="text-xs text-gray-500 mt-4 text-center">Aguardando login administrativo.</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="../js/administrativo.js"></script>
  </body>
</html>
