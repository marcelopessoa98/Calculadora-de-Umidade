<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Conversão Técnica - ConcreFuji</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      input,
      select,
      textarea {
        font-size: 16px !important;
      }
      .bg-concre {
        background-color: #1a1a1a;
      }
    </style>
  </head>
  <body class="bg-gray-100 min-h-screen p-4 font-sans text-gray-900">
    <div class="max-w-md mx-auto">
      <a
        href="../index.html"
        class="inline-flex items-center mb-6 text-gray-500 hover:text-red-600 transition-colors group"
      >
        <i
          class="fa-solid fa-arrow-left mr-2 transition-transform group-hover:-translate-x-1"
        ></i>
        Voltar ao Menu
      </a>

      <article
        id="captureArea"
        class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-gray-200 animate-in fade-in zoom-in duration-500"
      >
        <header class="bg-concre p-6 text-white border-b-4 border-red-600">
          <h2 class="text-xl font-black uppercase tracking-tighter text-center">
            Controle de <span class="text-red-600">Rompimento</span>
          </h2>
          <p
            class="text-[9px] text-center text-gray-400 font-bold uppercase tracking-widest mt-1"
          >
            ConcreFuji Quality Control
          </p>
        </header>

        <div class="p-6 space-y-5">
          <div class="grid grid-cols-2 gap-3">
            <section>
              <label
                class="block text-[10px] font-black text-gray-400 uppercase mb-1 ml-1"
                >Idade do CP:</label
              >
              <select
                id="idadeCP"
                class="w-full p-3 bg-gray-50 border border-gray-200 rounded-2xl font-bold text-xs outline-none focus:ring-2 focus:ring-red-500 transition-all"
              >
                <option value="normal">Geral / Outros</option>
                <option value="12h">12 Horas</option>
                <option value="7d">7 Dias</option>
              </select>
            </section>
            <section id="fckTargetContainer" class="hidden">
              <label
                class="block text-[10px] font-black text-gray-400 uppercase mb-1 ml-1"
                >fck Projeto (MPa):</label
              >
              <input
                type="number"
                id="fckProjeto"
                class="w-full p-3 bg-red-50 border border-red-100 rounded-2xl font-bold text-xs outline-none focus:ring-2 focus:ring-red-500"
                placeholder="Ex: 25"
              />
            </section>
          </div>

          <section>
            <label
              class="block text-[10px] font-black text-gray-400 uppercase mb-1 ml-1"
              >Dimensões (mm):</label
            >
            <select
              id="tipoCP"
              class="w-full p-3 bg-gray-50 border border-gray-200 rounded-2xl font-bold text-xs outline-none focus:ring-2 focus:ring-red-500"
            >
              <option value="78.54">100 x 200 (Padrão)</option>
              <option value="176.71">150 x 300</option>
              <option value="16.00">40 x 40 (Argamassa)</option>
              <option value="64.00">40 x 160</option>
              <option value="19.63">50 x 100</option>
              <option value="custom">Outro (Digitar Manual)</option>
            </select>

            <div
              id="customDims"
              class="hidden grid grid-cols-2 gap-3 mt-3 animate-in slide-in-from-top-2"
            >
              <input
                type="number"
                id="larguraCustom"
                class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-xs"
                placeholder="Diâmetro/Base"
              />
              <input
                type="number"
                id="alturaCustom"
                class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-xs"
                placeholder="Altura (Opcional)"
              />
            </div>
          </section>

          <section>
            <label
              class="block text-[10px] font-black text-gray-400 uppercase mb-2 ml-1 text-center"
              >Unidade da Prensa:</label
            >
            <div class="grid grid-cols-2 gap-2">
              <button
                type="button"
                data-unit="tf"
                class="unit-btn p-3 rounded-2xl border-2 border-gray-100 font-black text-gray-400 hover:bg-gray-50 transition-all uppercase text-xs"
              >
                Tf (Ton)
              </button>
              <button
                type="button"
                data-unit="kn"
                class="unit-btn p-3 rounded-2xl border-2 border-gray-100 font-black text-gray-400 hover:bg-gray-50 transition-all uppercase text-xs"
              >
                kN (KiloNewton)
              </button>
            </div>
          </section>

          <section>
            <label
              class="block text-[10px] font-black text-gray-400 uppercase mb-1 ml-1"
              >Carga Lida:</label
            >
            <input
              type="number"
              id="valorCarga"
              class="w-full p-5 text-4xl font-black text-center bg-gray-50 border-none rounded-[2rem] outline-none focus:ring-4 focus:ring-red-500/20 transition-all text-gray-800"
              placeholder="0.00"
              step="0.01"
            />
          </section>

          <button
            id="btnProcessar"
            class="w-full bg-red-600 hover:bg-red-700 text-white font-black py-5 rounded-[1.5rem] shadow-xl shadow-red-200 transition-all active:scale-95 uppercase text-xs tracking-widest"
          >
            Processar Ensaio
          </button>

          <div
            id="resBox"
            class="hidden space-y-4 pt-4 border-t border-gray-100"
          >
            <div class="grid grid-cols-2 gap-3">
              <div class="bg-gray-50 p-4 rounded-2xl">
                <span class="text-[9px] font-bold text-gray-400 uppercase"
                  >Em Toneladas</span
                >
                <div id="resTf" class="text-lg font-black text-gray-700"></div>
              </div>
              <div class="bg-gray-50 p-4 rounded-2xl">
                <span class="text-[9px] font-bold text-gray-400 uppercase"
                  >Em KiloNewtons</span
                >
                <div id="resKn" class="text-lg font-black text-gray-700"></div>
              </div>
            </div>

            <div
              class="bg-emerald-500 p-6 rounded-[2rem] text-white text-center shadow-lg relative overflow-hidden"
            >
              <div class="relative z-10">
                <span
                  class="text-[10px] font-black uppercase tracking-[0.2em] opacity-80"
                  >Resistência Final</span
                >
                <div class="flex items-center justify-center gap-2 mt-1">
                  <span
                    id="resMpa"
                    class="text-5xl font-black italic tracking-tighter"
                    >0.00</span
                  >
                  <span class="text-xl font-bold opacity-80">MPa</span>
                </div>
              </div>
              <i
                class="fa-solid fa-vial absolute -right-4 -bottom-4 text-white/10 text-8xl rotate-12"
              ></i>
            </div>

            <div
              id="obsTecnica"
              class="hidden p-4 rounded-2xl text-[10px] font-black uppercase leading-tight border-2"
            ></div>
          </div>
        </div>
      </article>

      <footer class="grid grid-cols-2 gap-4 mt-6 px-2">
        <button
          id="btnLimpar"
          class="bg-white border border-gray-200 text-gray-400 font-black py-4 rounded-2xl hover:bg-gray-50 transition-all flex items-center justify-center gap-2 text-[10px] uppercase"
        >
          <i class="fa-solid fa-rotate-left"></i> Limpar
        </button>
        <button
          id="btnSalvar"
          class="bg-emerald-600 text-white font-black py-4 rounded-2xl shadow-lg shadow-emerald-200 hover:bg-emerald-700 transition-all flex items-center justify-center gap-2 text-[10px] uppercase"
        >
          <i class="fa-solid fa-camera"></i> Salvar Print
        </button>
      </footer>

      <p
        class="text-center text-gray-300 text-[8px] mt-8 font-bold uppercase tracking-[0.3em]"
      >
        SGI ConcreFuji • v2.0 Cloud
      </p>
    </div>

    <script src="../js/conversao.js"></script>
  </body>
</html>
