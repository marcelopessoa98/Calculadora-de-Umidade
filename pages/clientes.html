<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Clientes - ConcreFuji</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      /* Ajuste para mobile para não dar zoom no input */
      input,
      textarea {
        font-size: 16px !important;
      }
      body {
        -webkit-tap-highlight-color: transparent;
      }
    </style>
  </head>
  <body class="bg-gray-50 min-h-screen p-4 pb-28 font-sans text-gray-900">
    <div class="max-w-md mx-auto">
      <div class="flex justify-between items-center mb-6">
        <a
          href="../index.html"
          class="text-gray-400 hover:text-red-600 transition-colors"
        >
          <i class="fa-solid fa-arrow-left mr-2"></i> Voltar
        </a>
        <button
          id="btnAdminLogin"
          class="text-[10px] font-bold bg-white border border-gray-200 px-4 py-2 rounded-full text-gray-500 shadow-sm active:scale-95 transition-all"
        >
          <i class="fa-solid fa-lock mr-1 text-red-600"></i> ÁREA DO ADMIN
        </button>
      </div>

      <header class="mb-8 text-center">
        <h1
          class="text-2xl font-black text-gray-800 uppercase tracking-tighter"
        >
          Gestão de <span class="text-red-600">Clientes</span>
        </h1>
        <p
          class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-1 italic"
        >
          SGI - ConcreFuji Lab
        </p>
      </header>

      <section
        id="formCadastro"
        class="hidden bg-white p-6 rounded-[2.5rem] shadow-xl border border-gray-100 mb-8 space-y-4 animate-in slide-in-from-top duration-500"
      >
        <div class="flex justify-between items-center mb-2">
          <span
            class="text-[10px] font-bold text-red-600 uppercase tracking-widest"
            >Novo Registro Cloud</span
          >
          <button
            id="btnLogout"
            class="text-[10px] font-bold text-gray-300 hover:text-red-600 uppercase"
          >
            Sair
          </button>
        </div>

        <div class="space-y-3">
          <input
            type="text"
            id="nomeCliente"
            class="w-full p-4 bg-gray-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-red-500 text-sm"
            placeholder="Nome do Cliente"
          />

          <div class="grid grid-cols-2 gap-3">
            <input
              type="text"
              id="nomeObra"
              class="w-full p-4 bg-gray-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-red-500 text-sm"
              placeholder="Obra"
            />
            <input
              type="text"
              id="refObra"
              class="w-full p-4 bg-gray-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-red-500 text-sm"
              placeholder="Referência"
            />
          </div>

          <textarea
            id="obsObra"
            rows="3"
            class="w-full p-4 bg-gray-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-red-500 text-sm"
            placeholder="Observações (Traço, Cimento, POP...)"
          ></textarea>

          <input
            type="text"
            id="enderecoObra"
            class="w-full p-4 bg-gray-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-red-500 text-sm"
            placeholder="Endereço da obra (abre no Google Maps)"
          />
        </div>

        <button
          id="btnSalvarCliente"
          class="w-full bg-red-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-red-100 active:scale-95 transition-all uppercase text-xs tracking-widest"
        >
          Sincronizar com a Nuvem
        </button>
      </section>

      <div class="relative mb-6">
        <span
          class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400"
        >
          <i class="fa-solid fa-magnifying-glass text-xs"></i>
        </span>
        <input
          type="text"
          id="inputBusca"
          class="w-full pl-10 pr-4 py-4 bg-white border border-gray-100 rounded-2xl shadow-sm outline-none focus:ring-2 focus:ring-red-500 text-sm transition-all"
          placeholder="Filtrar por cliente, obra ou ref..."
        />
      </div>

      <div class="flex items-center justify-between mb-4 px-2">
        <h3
          class="font-black text-gray-800 uppercase text-[10px] tracking-widest"
        >
          Obras Sincronizadas
        </h3>
        <div class="flex items-center gap-2">
          <span
            id="contadorClientes"
            class="text-[10px] bg-red-600 px-2 py-0.5 rounded-md font-bold text-white shadow-sm shadow-red-200"
            >0</span
          >
        </div>
      </div>

      <ul id="listaClientes" class="space-y-4"></ul>
    </div>

    <div
      id="adminModal"
      class="hidden fixed inset-0 z-50 bg-black/50 backdrop-blur-[2px] p-4 flex items-center justify-center"
    >
      <div class="w-full max-w-sm bg-white rounded-3xl shadow-2xl border border-gray-100 p-6">
        <div class="mb-4">
          <h3 class="text-sm font-black uppercase tracking-wider text-gray-800">
            Acesso Admin
          </h3>
          <p class="text-[11px] text-gray-500 mt-1">
            Digite a senha para liberar cadastro, edição e exclusão.
          </p>
        </div>

        <form id="adminLoginForm" class="space-y-3">
          <input
            type="password"
            id="adminSenhaInput"
            class="w-full p-4 bg-gray-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-red-500 text-sm"
            placeholder="Senha do administrador"
            autocomplete="current-password"
          />
          <div class="flex gap-2">
            <button
              type="button"
              id="adminModalCancelar"
              class="flex-1 bg-gray-100 text-gray-600 font-bold py-3 rounded-2xl text-xs uppercase tracking-wider"
            >
              Cancelar
            </button>
            <button
              type="submit"
              class="flex-1 bg-red-600 text-white font-bold py-3 rounded-2xl text-xs uppercase tracking-wider"
            >
              Entrar
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="../js/clientes.js"></script>
  </body>
</html>
