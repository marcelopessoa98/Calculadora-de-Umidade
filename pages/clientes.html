<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clientes - ConcreFuji</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body class="bg-gray-50 min-h-screen p-4 pb-20 font-sans text-gray-900">
    <div class="max-w-md mx-auto">
      <div class="flex justify-between items-center mb-6">
        <a
          href="../index.html"
          class="text-gray-500 hover:text-red-600 transition-colors"
        >
          <i class="fa-solid fa-arrow-left mr-2"></i> Voltar
        </a>
        <button
          id="btnAdminLogin"
          class="text-xs font-bold bg-gray-200 px-3 py-1 rounded-full text-gray-600"
        >
          <i class="fa-solid fa-lock mr-1"></i> Admin
        </button>
      </div>

      <header class="mb-6">
        <h1
          class="text-2xl font-black text-gray-800 uppercase tracking-tighter"
        >
          Lista de <span class="text-red-600">Clientes</span>
        </h1>
      </header>

      <section
        id="formCadastro"
        class="hidden bg-white p-6 rounded-3xl shadow-lg border-2 border-red-50 mb-8 space-y-4 animate-in slide-in-from-top duration-500"
      >
        <div class="flex justify-between items-center">
          <h3 class="font-bold text-red-600 text-sm uppercase">
            Novo Cadastro
          </h3>
          <button
            id="btnLogout"
            class="text-[10px] font-bold text-gray-400 hover:text-red-600 uppercase"
          >
            Sair
          </button>
        </div>

        <div>
          <label
            class="block text-[10px] font-bold text-gray-400 uppercase mb-1"
            >Nome do Cliente</label
          >
          <input
            type="text"
            id="nomeCliente"
            class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-red-500"
            placeholder="Ex: Construtora Silva"
          />
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label
              class="block text-[10px] font-bold text-gray-400 uppercase mb-1"
              >Obra</label
            >
            <input
              type="text"
              id="nomeObra"
              class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-red-500"
              placeholder="Residencial"
            />
          </div>
          <div>
            <label
              class="block text-[10px] font-bold text-gray-400 uppercase mb-1"
              >Referência</label
            >
            <input
              type="text"
              id="refObra"
              class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-red-500"
              placeholder="REF-01"
            />
          </div>
        </div>

        <div>
          <label
            class="block text-[10px] font-bold text-gray-400 uppercase mb-1"
            >Observações</label
          >
          <textarea
            id="obsObra"
            rows="2"
            class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-red-500"
            placeholder="Ex: Cimento CP-IV, Traço especial..."
          ></textarea>
        </div>

        <button
          id="btnSalvarCliente"
          class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-2xl shadow-md transition-all active:scale-95"
        >
          CADASTRAR CLIENTE
        </button>
      </section>

      <div class="flex items-center justify-between mb-4">
        <h3 class="font-bold text-gray-700">Obras Ativas</h3>
        <span
          id="contadorClientes"
          class="text-[10px] bg-gray-200 px-2 py-0.5 rounded-full font-bold text-gray-500"
          >0</span
        >
      </div>
      <ul id="listaClientes" class="space-y-4"></ul>
    </div>

    <script src="../js/clientes.js"></script>
  </body>
</html>
