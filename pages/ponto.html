<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Ponto - ConcreFuji</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
      body { -webkit-tap-highlight-color: transparent; }
      video { transform: scaleX(-1); }
    </style>
  </head>
  <body class="bg-gray-50 min-h-screen p-4 pb-24 font-sans text-gray-900">
    <div class="max-w-md mx-auto">
      <div class="flex justify-between items-center mb-6">
        <a href="../index.html" class="text-gray-400 hover:text-red-600 transition-colors">
          <i class="fa-solid fa-arrow-left mr-2"></i> Voltar
        </a>
        <button id="btnAdminAcesso" class="text-[10px] font-bold bg-white border border-gray-200 px-3 py-1.5 rounded-full text-gray-500">
          Área do Admin
        </button>
      </div>

      <header class="mb-6 text-center">
        <h1 class="text-2xl font-black text-gray-800 uppercase tracking-tighter">
          Controle de <span class="text-red-600">Ponto</span>
        </h1>
        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-1 italic">Reconhecimento Facial + GPS</p>
      </header>

      <section class="bg-white p-4 rounded-3xl shadow-sm border border-gray-100 mb-5">
        <div class="aspect-video bg-gray-100 rounded-2xl overflow-hidden flex items-center justify-center">
          <video id="video" autoplay muted playsinline class="w-full h-full object-cover"></video>
        </div>
        <button id="btnIniciarCamera" class="mt-3 w-full bg-slate-800 text-white font-bold py-3 rounded-2xl text-xs uppercase tracking-widest">Iniciar Câmera</button>
      </section>

      <section class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 space-y-3 mb-5">
        <h3 class="text-xs font-black uppercase tracking-widest text-gray-700">Login do Funcionário</h3>
        <input id="loginFuncionarioId" type="text" placeholder="Matrícula/ID" class="w-full p-3 rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-red-500 text-sm" />
        <input id="loginFuncionarioSenha" type="password" placeholder="Senha" class="w-full p-3 rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-red-500 text-sm" />
        <div class="grid grid-cols-2 gap-2">
          <button id="btnLoginFuncionario" class="w-full bg-blue-600 text-white font-bold py-3 rounded-2xl text-xs uppercase tracking-widest">Entrar</button>
          <button id="btnLogoutFuncionario" class="w-full bg-gray-200 text-gray-700 font-bold py-3 rounded-2xl text-xs uppercase tracking-widest">Sair</button>
        </div>
        <p id="funcionarioLogadoInfo" class="text-[11px] text-gray-500">Nenhum funcionário logado.</p>
      </section>

      <section id="secaoAdmin" class="hidden bg-white p-5 rounded-3xl shadow-sm border border-gray-100 space-y-3 mb-5">
        <div class="flex justify-between items-center">
          <h3 class="text-xs font-black uppercase tracking-widest text-gray-700">Cadastro de Funcionário</h3>
          <button id="btnLogoutAdmin" class="text-[10px] font-bold text-gray-400 hover:text-red-600 uppercase">Sair Admin</button>
        </div>
        <input id="funcionarioId" type="text" placeholder="Matrícula/ID" class="w-full p-3 rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-red-500 text-sm" />
        <input id="funcionarioNome" type="text" placeholder="Nome completo" class="w-full p-3 rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-red-500 text-sm" />
        <input id="funcionarioSenha" type="password" placeholder="Senha do funcionário" class="w-full p-3 rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-red-500 text-sm" />
        <button id="btnCadastrarFace" class="w-full bg-red-600 text-white font-bold py-3 rounded-2xl text-xs uppercase tracking-widest">Cadastrar Face (JSON)</button>
      </section>

      <section class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 space-y-3">
        <h3 class="text-xs font-black uppercase tracking-widest text-gray-700">Registrar Ponto</h3>
        <button id="btnRegistrarPonto" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-2xl text-xs uppercase tracking-widest">Bater Ponto</button>
        <p id="status" class="text-xs text-gray-500 leading-relaxed">Pronto para iniciar.</p>
      </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="../js/ponto.js"></script>
  </body>
</html>
