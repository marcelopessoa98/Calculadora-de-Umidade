<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Umidade de Areia - ConcreFuji</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body class="bg-gray-50 min-h-screen p-4 font-sans text-gray-900">
    <div class="max-w-md mx-auto">
      <a
        href="../index.html"
        class="inline-flex items-center mb-6 text-gray-500 hover:text-red-600 transition-colors group"
      >
        <i
          class="fa-solid fa-arrow-left mr-2 transition-transform group-hover:-translate-x-1"
        ></i>
        Voltar ao Menu
      </a>

      <article
        id="captureArea"
        class="bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-200"
      >
        <header class="bg-gray-800 p-6 text-white border-b-4 border-red-600">
          <div class="flex justify-center mb-2"></div>
          <h2 class="text-xl font-bold uppercase tracking-wider text-center">
            Teor de Umidade
          </h2>
        </header>

        <div class="p-8 space-y-6">
          <section>
            <label
              for="pesoUmido"
              class="block text-xs font-bold text-gray-500 uppercase mb-2"
              >Peso da Areia Úmida (g)</label
            >
            <input
              type="number"
              id="pesoUmido"
              class="w-full p-4 text-xl border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-red-500 transition-all"
              placeholder="0.00"
              step="0.01"
            />
          </section>

          <section>
            <label
              for="pesoSeco"
              class="block text-xs font-bold text-gray-500 uppercase mb-2"
              >Peso da Areia Seca (g)</label
            >
            <input
              type="number"
              id="pesoSeco"
              class="w-full p-4 text-xl border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-red-500 transition-all"
              placeholder="0.00"
              step="0.01"
            />
          </section>

          <button
            id="btnCalcular"
            class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95"
          >
            CALCULAR UMIDADE
          </button>

          <div id="resBox" class="hidden mt-6 animate-in fade-in duration-500">
            <div
              class="bg-gray-50 border-l-4 border-red-600 p-6 rounded-r-xl text-center shadow-inner"
            >
              <span
                class="text-[10px] text-gray-400 font-bold uppercase tracking-widest"
                >Resultado do Ensaio</span
              >
              <div id="valor" class="text-5xl font-black text-gray-800 mt-1">
                0,00%
              </div>
            </div>
          </div>
        </div>
      </article>

      <footer class="grid grid-cols-2 gap-4 mt-6">
        <button
          id="btnLimpar"
          class="bg-white border border-gray-300 text-gray-600 font-bold py-3 rounded-xl hover:bg-gray-100 transition-all flex items-center justify-center gap-2"
        >
          <i class="fa-solid fa-eraser"></i> Limpar
        </button>
        <button
          id="btnSalvar"
          class="bg-emerald-600 text-white font-bold py-3 rounded-xl shadow-lg hover:bg-emerald-700 transition-all flex items-center justify-center gap-2"
        >
          <i class="fa-solid fa-camera"></i> Printar
        </button>
      </footer>

      <p
        class="text-center text-gray-400 text-[10px] mt-8 uppercase tracking-widest"
      >
        SGI - ConcreFuji | Lab Tech
      </p>
    </div>

    <script src="../js/security.js"></script>
    <script src="../js/umidade.js"></script>
  </body>
</html>
